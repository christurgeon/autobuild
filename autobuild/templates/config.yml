# autobuild configuration. Safe to edit; the loop re-reads it each iteration.
# Values are validated when autobuild starts: a bad value (e.g. integration: prr,
# max_parallel: 0) fails fast with a listed error instead of surfacing mid-run.

model: claude-opus-4-8        # non-empty string, passed to `claude --model`
max_parallel: 3               # integer >= 1: WIP limit / concurrent worktrees
base_branch: main             # non-empty string: branches fork from and merge into this
max_iterations: 100           # integer >= 1: global safety stop for the outer loop

# What happens to a task's branch when its session reports COMPLETE:
#   pr         -> open a pull request for human review (default, safest)
#   auto-merge -> if checks pass, merge the branch into base_branch
#   branch     -> leave the branch; a human merges later
integration: pr

# In `pr` mode, a transient network blip or GitHub rate-limit during integration (the
# `git push` and `gh pr create` steps) is retried with increasing backoff (1s, 2s, …)
# instead of being turned into a spurious "no PR" outcome. Deterministic failures (auth,
# no remote, merge conflict) stay single-shot. 0 = no retries (single attempt).
integration_max_retries: 2    # integer >= 0: extra attempts for transient push/PR-open ops

# Worktree isolation (no config keys — controlled by env vars, like AUTOBUILD_SANDBOX):
# each session works only in its own git worktree, never on base_branch.
#  - `autobuild run` REFUSES TO START if base_branch's working tree has uncommitted source
#    (a stray `git add -A` in a session could sweep it into a task commit). Commit/stash
#    first, or set AUTOBUILD_ALLOW_DIRTY_BASE=1 to override. (tasks/ + .autobuild/ exempt.)
#  - The reaper detects a session that committed onto base_branch and refuses to integrate
#    it: in auto-merge it HALTS the run (base corrupt); in pr/branch it just blocks that
#    one task. Forensics land in .autobuild/sessions/<id>/leak.json.

# Commands run after the implement phase. ALL must exit 0 to commit/finish.
# Must be a YAML list of non-empty strings (a bare string is rejected). Tailor
# these to your project. Empty list = no checks (not recommended).
checks:
  - "echo 'replace me with real checks, e.g. npm test'"

# Before integrating a COMPLETE session, the reaper re-runs `checks` against the
# session's worktree itself — it does not take the agent's word that they passed.
# Any failure marks the task `blocked` and keeps the branch (see <session>/checks.log).
# Set to false to trust the agent and skip the harness-side re-run (not recommended).
verify_checks: true

# auto-merge only: after a clean `--no-ff` merge, re-run `checks` against the COMBINED
# base tree. Two green branches can still merge into a red base with no textual conflict
# (semantic skew) — this catches that. On failure the merge is reverted (base hard-reset
# to its pre-merge HEAD) and the task is `blocked` with its branch kept (see
# <session>/post-merge-checks.log). Set to false to land merges without the combined re-run.
verify_after_merge: true

claude_cmd: claude            # override if your Claude CLI binary differs

# --- session permission posture ---------------------------------------------
# How much a spawned `claude -p` session may do unattended.
#
# DEFAULT (below) is maximally permissive: full bypass, no sandbox required, so a
# session can do whatever it needs without prompts. The cost: the agent runs with
# --dangerously-skip-permissions and inherits THIS machine's git credentials + network
# (a prompt-injected GOAL.md/task could push to your remote or exfiltrate). Acceptable
# when those are disposable (a sandbox VM / no-push creds); otherwise tighten below.
dangerously_bypass_permissions: true   # true => --dangerously-skip-permissions
require_sandbox_for_bypass: false      # true => bypass allowed only if AUTOBUILD_SANDBOX=1

# To run fenced instead, set dangerously_bypass_permissions: false; then these apply.
# NOTE: even fenced, the allowlist is ergonomics, NOT a security boundary —
# `Bash(git:*)` is ~a full shell. The only real isolation is a disposable sandbox VM.
permission_mode: acceptEdits  # plan | default | acceptEdits | bypassPermissions
allowed_tools:                # base tools; Bash(git:*) + one Bash(<check>:*) auto-added
  - Edit
  - Write
  - Read
session_max_turns: 80         # integer >= 1: --max-turns cap per session

# --- per-session timeout -----------------------------------------------------
task_timeout_seconds: 3600    # integer >= 1: per-session wall budget (monotonic)
kill_grace_seconds: 20        # integer >= 1 (no 0-grace): SIGTERM -> wait -> SIGKILL
timeout_max_retries: 2        # integer >= 0: auto-retries for a timed-out task before it's
                              # left terminal `timeout` (0 = block on the first timeout).
                              # Each retry re-spends task_timeout_seconds above.

# --- operator notifications --------------------------------------------------
# Generic, mechanism-agnostic hook: autobuild runs this shell command on the COARSE
# run-level events worth knowing about while you're away. "" (the default) disables it.
# The event type and message are passed as environment variables:
#   AUTOBUILD_EVENT    one of: done | halt | needs_human
#   AUTOBUILD_MESSAGE  a short human-readable summary of the event
# Events (low-volume by design — run-level + NEEDS_HUMAN, never per-task-success):
#   done         the run ended (drained / settled / max_iterations); message has the counts
#   halt         a session escaped onto base_branch and the run HALTED (auto-merge)
#   needs_human  a session reported NEEDS_HUMAN (names the task)
# It is best-effort: bounded by a timeout and ALL failures are swallowed (warned), so a
# broken notifier never breaks a run. The command is a shell you control, NOT a security
# boundary. Example (Telegram via curl):
#   notify_command: 'curl -s -X POST "https://api.telegram.org/bot$TOKEN/sendMessage"
#     --data-urlencode "chat_id=$CHAT" --data-urlencode "text=[$AUTOBUILD_EVENT] $AUTOBUILD_MESSAGE"'
notify_command: ""            # string; "" = notifications disabled
